[build]
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://api.mavricks.fun/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/pay/*"
  to = "https://api.mavricks.fun/pay/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
